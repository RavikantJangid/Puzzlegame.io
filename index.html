<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riddle Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    background:#fff;
    width:100%;
    max-width:500px;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    color:#333;
    margin-bottom:20px;
}

.owner{
    font-size:20px;
    color:#0077cc;
    font-weight:bold;
    margin-bottom:20px;
}

p{
    color:#555;
    line-height:1.6;
    margin-bottom:30px;
}

button{
    background:#0077cc;
    color:white;
    border:none;
    padding:15px 30px;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#005fa3;
}
</style>

</head>
<body>

<div class="container">

<h1>Welcome to the Riddle Game</h1>

<div class="owner">
Owner: Ravikant Jangid
</div>

<p>
Test your brain by solving 9 interesting riddles.
You can move to the next question only after giving the correct answer.
Good Luck!
</p>

<button onclick="startGame()">Start Game</button>

</div>

<script>
function startGame(){
    window.location.href="riddle1.html";
}
</script>

</body>
</html>
