<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riddle 9 - Final</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}
.container{
    background:#fff;
    width:100%;
    max-width:500px;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}
h1{
    color:#333;
    margin-bottom:20px;
}
p{
    font-size:20px;
    color:#555;
    line-height:1.6;
    margin-bottom:25px;
}
input{
    width:100%;
    padding:12px;
    font-size:18px;
    border:2px solid #0077cc;
    border-radius:8px;
    margin-bottom:20px;
}
button{
    background:#0077cc;
    color:#fff;
    border:none;
    padding:12px 30px;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
}
button:hover{
    background:#005fa3;
}
</style>
</head>

<body>

<div class="container">

<h1>🎉 Final Riddle</h1>

<p>
What can travel around the world while staying in the same corner?
</p>

<input type="text" id="answer" placeholder="Enter your answer">

<button onclick="checkAnswer()">Finish Game</button>

</div>

<script>
function checkAnswer(){

    let ans = document.getElementById("answer").value.trim().toLowerCase();

    if(ans === "stamp"){
        alert("🎉 Congratulations! You solved all 9 riddles and completed the game!");
        window.location.href = "index.html";
    }
    else{
        alert("Wrong answer! Try again.");
    }

}
</script>

</body>
</html>
